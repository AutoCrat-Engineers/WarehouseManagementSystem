# ══════════════════════════════════════════════════════════════════════════════
# Host-Level NGINX Reverse Proxy
# Purpose: Forward all port 80 traffic → Docker container on 127.0.0.1:8080
# Location: /etc/nginx/sites-available/wms (symlink to sites-enabled)
#           OR /etc/nginx/conf.d/wms.conf
#
# IMPORTANT: Remove or disable the default site:
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # ── Prevent NGINX from caching proxied content ──
    proxy_cache off;
    proxy_buffering on;

    # ── Max upload size (match container's 12m for PDF payloads) ──
    client_max_body_size 12m;

    # ── Timeouts for slow upstream responses ──
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Main reverse proxy: ALL traffic → Docker container ──
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # ── Required headers for correct forwarding ──
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Connection        "";

        # ── Prevent stale content: force no proxy-level caching ──
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header X-Proxy-Cache "BYPASS" always;

        # ── Pass through cache headers from the container as-is ──
        # The container's NGINX handles caching policy (immutable for hashed assets,
        # no-cache for index.html via try_files). We don't override those here.
    }

    # ── Custom error pages (optional) ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── Health check endpoint for load balancers / monitoring ──
    location = /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
