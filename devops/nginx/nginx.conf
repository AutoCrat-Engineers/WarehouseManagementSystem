server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ══════════════════════════════════════════════════════════════
    # ⚠️  REPLACE_AFTER_AZURE_DEPLOY with your new Container App URL
    #     Get it by running:
    #     az containerapp show --name autocrat-pdf-service \
    #       --resource-group autocrat-wms-rg \
    #       --query "properties.configuration.ingress.fqdn" -o tsv
    # ══════════════════════════════════════════════════════════════

    # ── Reverse proxy to PDF service (Azure Container App) ──
    # Frontend calls /v1/generate-pdf → nginx proxies to Azure with API key
    location /v1/generate-pdf {
        # Handle CORS preflight (OPTIONS) at nginx level
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, X-API-Key' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass         https://REPLACE_AFTER_AZURE_DEPLOY;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host REPLACE_AFTER_AZURE_DEPLOY;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Inject API key server-side (never exposed to browser)
        proxy_set_header   X-API-Key "c1b4d94eab223286dfcaf1cb3b9f30cbf20ee7246f7c4b687608e17fd0725f04";

        # Add CORS headers to the proxied response
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'X-Request-ID, X-PDF-Size-KB, X-PDF-Generation-Ms, Content-Disposition' always;

        # PDF generation can take up to 30s
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Large HTML payloads (up to 10 MB)
        client_max_body_size 12m;
    }

    # ── Proxy deprecated /api/generate-pdf endpoint too ──
    location /api/generate-pdf {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, X-API-Key' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass         https://REPLACE_AFTER_AZURE_DEPLOY;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host REPLACE_AFTER_AZURE_DEPLOY;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-API-Key "c1b4d94eab223286dfcaf1cb3b9f30cbf20ee7246f7c4b687608e17fd0725f04";

        add_header 'Access-Control-Allow-Origin' '*' always;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 12m;
    }

    # ── PDF service health endpoints (optional, for monitoring) ──
    location /health {
        proxy_pass         https://REPLACE_AFTER_AZURE_DEPLOY;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host REPLACE_AFTER_AZURE_DEPLOY;
    }

    location /healthz {
        proxy_pass         https://REPLACE_AFTER_AZURE_DEPLOY;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host REPLACE_AFTER_AZURE_DEPLOY;
    }

    location /readyz {
        proxy_pass         https://REPLACE_AFTER_AZURE_DEPLOY;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host REPLACE_AFTER_AZURE_DEPLOY;
    }

    # ── SPA routing: all other paths → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
