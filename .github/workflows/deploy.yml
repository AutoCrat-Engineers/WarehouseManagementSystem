name: Build, Test, Deploy (deploy/pre-prod)

on:
  push:
    branches:
      - deploy/pre-prod

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present


  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # ===================== ACR LOGIN =====================
      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login warehouseae.azurecr.io \
           -u ${{ secrets.ACR_USERNAME }} \
           --password-stdin

      # ===================== DOCKER BUILD (FIXED) =====================
      - name: Build Docker image
        run: |
          docker build --no-cache \
            -t warehouseae.azurecr.io/wms-service:${{ github.sha }} \
            -f Dockerfile .

      - name: Tag image as latest
        run: |
          docker tag \
            warehouseae.azurecr.io/wms-service:${{ github.sha }} \
            warehouseae.azurecr.io/wms-service:latest

      - name: Push Docker images
        run: |
          docker push warehouseae.azurecr.io/wms-service:${{ github.sha }}
          docker push warehouseae.azurecr.io/wms-service:latest


      # ===================== SSH DEPLOY =====================
      - name: Deploy on Azure VM (safe SHA-based deploy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "===== ACR LOGIN ====="
            echo "${{ secrets.ACR_PASSWORD }}" | docker login warehouseae.azurecr.io \
              -u ${{ secrets.ACR_USERNAME }} \
              --password-stdin

            echo "===== CLEAN OLD CONTAINER ====="
            docker stop wms || true
            docker rm wms || true

            echo "===== CLEAN UNUSED IMAGES ====="
            docker image prune -af || true

            echo "===== PULL NEW IMAGE (SHA BASED) ====="
            docker pull warehouseae.azurecr.io/wms-service:${{ github.sha }}

            echo "===== START STAGING CONTAINER ====="
            docker run -d \
              --name wms-new \
              -p 127.0.0.1:8080:80 \
              --env PDF_API_KEY=${{ secrets.PDF_API_KEY }} \
              --restart unless-stopped \
              warehouseae.azurecr.io/wms-service:${{ github.sha }}

            echo "===== WAIT FOR STARTUP ====="
            sleep 15

            echo "===== HEALTH CHECK ====="
            curl -f http://localhost:8080 || (docker logs wms-new && exit 1)

            echo "===== PROMOTE TO PRODUCTION ====="
            docker stop wms-new
            docker rm wms-new

            docker run -d \
              --name wms \
              -p 127.0.0.1:8080:80 \
              --env PDF_API_KEY=${{ secrets.PDF_API_KEY }} \
              --restart unless-stopped \
              warehouseae.azurecr.io/wms-service:${{ github.sha }}

            echo "===== FINAL STATUS ====="
            docker ps
