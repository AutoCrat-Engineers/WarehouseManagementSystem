name: Build, Test, Deploy (deploy/test-1)

on:
  push:
    branches:
      - deploy/test-1

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build app
        run: npm run build

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker pull node:18-alpine || true
          docker build --pull -t shravanaweb/wms:latest -f devops/docker/Dockerfile .

      - name: Push Docker image
        run: docker push shravanaweb/wms:latest

      - name: Deploy on EC2 (clean replace strategy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "===== DOCKER CLEANUP ====="
            docker stop wms || true
            docker rm wms || true
            docker stop wms-new || true
            docker rm wms-new || true

            echo "===== REMOVE UNUSED IMAGES ====="
            docker image prune -af

            echo "===== PULL LATEST IMAGE ====="
            docker pull shravanaweb/wms:latest

            echo "===== START VALIDATION CONTAINER ====="
            docker run -d \
              --name wms-new \
              -p 8080:3000 \
              --restart unless-stopped \
              shravanaweb/wms:latest

            echo "Waiting for container startup..."
            sleep 15

            echo "===== VALIDATE CONTAINER ====="
            docker ps | grep wms-new

            if [ $? -eq 0 ]; then
              echo "Validation success → switching production container"

              docker stop wms-new
              docker rm wms-new

              docker run -d \
                --name wms \
                -p 80:3000 \
                --restart unless-stopped \
                shravanaweb/wms:latest

              echo "===== DEPLOYMENT SUCCESS ====="
              docker ps
            else
              echo "===== DEPLOYMENT FAILED ====="
              docker logs wms-new
              docker stop wms-new || true
              docker rm wms-new || true
              exit 1
            fi
