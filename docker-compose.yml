services:
  frontend:
    image: autocratwms.azurecr.io/wms-service:latest
    container_name: wms
    ports:
      - "8080:80"
    environment:
      - PDF_API_KEY=${PDF_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
