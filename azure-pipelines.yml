trigger:
  branches:
    include:
      - deploy/pre-prod

pool:
  vmImage: ubuntu-latest

variables:
- group: WMS-Production-Secrets

stages:

- stage: Build_Test_Deploy
  displayName: Build Test Deploy Stage

  jobs:

  - job: BuildTest
    displayName: Build and Test

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: Install Node.js

    - script: npm ci
      displayName: Install Dependencies

    - script: npm test --if-present
      displayName: Run Tests

    - script: npm run build
      displayName: Build App

    - script: |
        echo "$(ACR_PASSWORD)" | docker login autocratwms.azurecr.io \
        -u "$(ACR_USERNAME)" \
        --password-stdin
      displayName: Login to Azure Container Registry

    - script: |
        docker pull node:20-alpine || true
        docker build -t autocratwms.azurecr.io/wms-service:latest -f Dockerfile .
        docker push autocratwms.azurecr.io/wms-service:latest
      displayName: Build and Push Docker Image

  - job: Deploy
    dependsOn: BuildTest
    displayName: Deploy to Azure VM

    steps:

    - task: InstallSSHKey@0
      inputs:
        knownHostsEntry: ''
        sshPublicKey: ''
        sshKeySecureFile: id_rsa

    - task: SSH@0
      inputs:
        sshEndpoint: 'AzureVM-SSH'
        runOptions: inline
        inline: |
          set -e

          echo "===== ACR LOGIN ====="
          echo "$(ACR_PASSWORD)" | docker login autocratwms.azurecr.io \
            -u "$(ACR_USERNAME)" \
            --password-stdin

          echo "===== STOP OLD CONTAINERS ====="
          docker stop wms || true
          docker rm wms || true
          docker stop wms-new || true
          docker rm wms-new || true

          echo "===== CLEAN UNUSED IMAGES ====="
          docker image prune -af || true

          echo "===== PULL LATEST IMAGE ====="
          docker pull autocratwms.azurecr.io/wms-service:latest

          echo "===== START VALIDATION CONTAINER ====="
          docker run -d \
            --name wms-new \
            -p 127.0.0.1:8080:80 \
            --env PDF_API_KEY=$(PDF_API_KEY) \
            --restart unless-stopped \
            autocratwms.azurecr.io/wms-service:latest

          sleep 15

          echo "===== HEALTH CHECK ====="
          curl -f http://localhost:8080 || exit 1

          echo "===== SWITCH TO PRODUCTION ====="
          docker stop wms-new
          docker rm wms-new

          docker run -d \
            --name wms \
            -p 127.0.0.1:8080:80 \
            --env PDF_API_KEY=$(PDF_API_KEY) \
            --restart unless-stopped \
            autocratwms.azurecr.io/wms-service:latest

          echo "===== CLEANUP NGINX ====="
          sudo rm -f /etc/nginx/conf.d/default.conf

          echo "===== DEPLOYMENT SUCCESS ====="
          docker ps
